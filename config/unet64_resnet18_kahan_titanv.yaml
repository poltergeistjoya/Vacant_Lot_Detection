data: data.yaml

model:
  type: unet
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 4
  classes: 1
  decoder_channels: [512, 256, 128, 64, 32]  # base_channels=64

training:
  batch_size: 8
  learning_rate: 0.001
  max_epochs: 500
  weight_decay: 0.0001
  patience: 40
  accumulation_steps: 1
  num_workers: 4
  oversample_factor: 8
  band_dropuout_p: 0.3
  band_dropuout_max: 1

loss:
  pos_weight: 30.0
  bce_weight: 0.5
  dice_weight: 0.0
  lovasz_weight: 0.5
  soft_positive_weight: 0.0
  soft_positive_target: 0.4

output_dir: outputs/models/unet
note: "UNet-64 + ResNet-50 (ImageNet) — 4 bands only, pw=30, 0.5 BCE + 0.5 Lovász, 8x oversample, 256 patch, band dropout"
