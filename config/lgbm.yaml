# LightGBM pixel-level baseline configuration.
# scale_pos_weight is set at runtime from true_nonvacant / true_vacant.

data_paths:
  vrt: data/imagery/naip/nyc/2022/naip_nyc_2022.vrt
  vacancy_mask: outputs/labels/vacancy_mask.tif
  borough_mask: outputs/labels/borough_mask.tif
  patch_splits: outputs/labels/patch_splits_512.json

model:
  type: lightgbm
  n_estimators: 500
  max_depth: 12
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 1000
  n_jobs: -1              # LightGBM uses histogram binning — no bootstrap copies, safe to use all cores
  random_state: 42

sampling:
  n_vacant: 19_700_000
  n_nonvacant: 60_000_000
  # True pixel counts — used to compute sample_weight per pixel.
  true_vacant_count: 19_700_000
  true_nonvacant_count: 566_000_000
  random_state: 42

output_dir: outputs/models/gbm

# Human-readable note written to metrics.json. Override with VACANT_LOT_RUN_NOTE env var.
note: ""
