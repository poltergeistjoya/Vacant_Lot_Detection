data_paths:
  vrt: data/imagery/naip/nyc/2022/naip_nyc_2022.vrt
  vacancy_mask: outputs/labels/vacancy_mask.tif
  borough_mask: outputs/labels/borough_mask.tif
  patch_splits: outputs/labels/patch_splits_512.json

model:
  type: unet
  encoder_name: resnet18
  encoder_weights: imagenet
  in_channels: 10
  classes: 1
  decoder_channels: [256, 128, 64, 32, 16]

training:
  batch_size: 6
  learning_rate: 0.001
  max_epochs: 50
  weight_decay: 0.0001
  patience: 5
  accumulation_steps: 1

loss:
  pos_weight: 1.0
  bce_weight: 0.0
  dice_weight: 1.0

output_dir: outputs/models/unet
note: "UNet + ResNet-18 encoder (ImageNet pretrained)"
