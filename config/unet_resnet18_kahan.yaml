data_paths:
  vrt: data/imagery/naip/nyc/2022/naip_nyc_2022.vrt
  vacancy_mask: outputs/labels/vacancy_mask.tif
  borough_mask: outputs/labels/borough_mask.tif
  patch_splits: outputs/labels/patch_splits_512.json

model:
  type: unet
  encoder_name: resnet18
  encoder_weights: imagenet
  in_channels: 10
  classes: 1
  decoder_channels: [512, 256, 128, 64, 32]  # base_channels=64

training:
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 500
  weight_decay: 0.0001
  patience: 40
  accumulation_steps: 1
  num_workers: 4

loss:
  pos_weight: 30.0
  bce_weight: 0.5
  dice_weight: 0.5

output_dir: outputs/models/unet
note: "UNet-64 + ResNet-18 (ImageNet) — Kahan Titan RTX, 0.5 BCE (pw=30) + 0.5 Dice, 4x vacant oversample + augment"
