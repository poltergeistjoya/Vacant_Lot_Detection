data: data.yaml

model:
  type: unet
  encoder_name: resnet18
  encoder_weights: null      # train from scratch
  in_channels: 10
  classes: 1
  decoder_channels: [512, 256, 128, 64, 32]  # base_channels=64

training:
  batch_size: 4
  learning_rate: 0.001
  max_epochs: 50
  weight_decay: 0.0001
  patience: 5
  accumulation_steps: 1

loss:
  pos_weight: 10.0
  bce_weight: 0.5
  dice_weight: 0.5
  soft_positive_weight: 0.0
  soft_positive_target: 0.4

output_dir: outputs/models/unet
note: "UNet-64 from scratch (wider decoder, no pretrained weights)"
