data_paths:
  vrt: data/imagery/naip/nyc/2022/naip_nyc_2022.vrt
  vacancy_mask: outputs/labels/vacancy_mask.tif
  borough_mask: outputs/labels/borough_mask.tif
  patch_splits: outputs/labels/patch_splits_1024.json

eval_stride: 512

model:
  type: deeplabv3plus
  encoder_name: resnet50
  encoder_weights: imagenet
  in_channels: 4
  classes: 1

training:
  batch_size: 16
  learning_rate: 0.001
  max_epochs: 500
  weight_decay: 0.0001
  patience: 40
  accumulation_steps: 1
  num_workers: 4
  oversample_factor: 8
  band_dropout_p: 0.3
  band_dropout_max: 1
  cosine_t_max: 100

loss:
  pos_weight: 30.0
  bce_weight: 0.5
  dice_weight: 0.0
  lovasz_weight: 0.5

output_dir: outputs/models/deeplabv3plus
note: "DeepLabV3+ + ResNet-50 (ImageNet) — 4 bands only, pw=30, 0.5 BCE + 0.5 Lovász, 8x oversample, 1024, band dropout"
