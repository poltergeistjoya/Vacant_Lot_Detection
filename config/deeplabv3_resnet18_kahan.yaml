data: data.yaml

model:
  type: deeplabv3plus
  encoder_name: resnet18
  encoder_weights: imagenet
  in_channels: 10
  classes: 1

training:
  batch_size: 32
  learning_rate: 0.001
  max_epochs: 500
  weight_decay: 0.0001
  patience: 40
  accumulation_steps: 1
  num_workers: 4

loss:
  pos_weight: 10.0
  bce_weight: 0.3
  dice_weight: 0.7
  soft_positive_weight: 0.0
  soft_positive_target: 0.4

output_dir: outputs/models/deeplabv3plus
note: "DeepLabV3+ + ResNet-18 (ImageNet) — Kahan Titan RTX, 0.3 BCE (pw=10) + 0.7 Dice"
